server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA : toute route inconnue renvoie index.html (React Router côté navigateur)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Les assets de Vite sont fingerprintés : cache long sans risque
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
